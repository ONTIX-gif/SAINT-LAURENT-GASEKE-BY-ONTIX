<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Students - Admin Panel</title>
    <link rel="stylesheet" href="main.css">
    <style>
        .admin-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 30px 0;
            flex-wrap: wrap;
            gap: 20px;
        }

        .page-title h2 {
            margin: 0;
            color: var(--primary-color);
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn-primary, .btn-secondary {
            padding: 12px 25px;
            border: none;
            border-radius: var(--border-radius);
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-dark) 100%);
            color: white;
            box-shadow: 0 4px 12px var(--shadow-glow);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 191, 255, 0.5);
        }

        .btn-secondary {
            background: transparent;
            border: 2px solid var(--primary-color);
            color: var(--primary-color);
        }

        .btn-secondary:hover {
            background: var(--primary-color);
            color: var(--bg-dark);
        }

        .search-filter {
            background: linear-gradient(135deg, rgba(13, 95, 127, 0.5), rgba(10, 74, 99, 0.5));
            padding: 25px;
            border-radius: var(--border-radius-lg);
            margin: 30px 0;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            box-shadow: 0 10px 30px var(--shadow);
        }

        .search-filter input,
        .search-filter select {
            padding: 12px 15px;
            border: 2px solid rgba(0, 191, 255, 0.3);
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border-radius: var(--border-radius);
            font-family: inherit;
            transition: var(--transition);
        }

        .search-filter input:focus,
        .search-filter select:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 15px rgba(0, 191, 255, 0.3);
        }

        .search-filter input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .search-filter select option {
            background: var(--bg-dark);
            color: white;
        }

        .table-container {
            background: linear-gradient(135deg, rgba(13, 95, 127, 0.5), rgba(10, 74, 99, 0.5));
            border-radius: var(--border-radius-lg);
            overflow: hidden;
            box-shadow: 0 10px 30px var(--shadow);
            margin: 30px 0;
        }

        .students-table {
            width: 100%;
            border-collapse: collapse;
        }

        .students-table thead {
            background: linear-gradient(135deg, #1a7f9a 0%, #0f5a7a 100%);
        }

        .students-table th {
            padding: 18px 15px;
            text-align: left;
            font-weight: 600;
            color: white;
            font-size: 14px;
            border-bottom: 2px solid rgba(0, 191, 255, 0.2);
        }

        .students-table td {
            padding: 15px;
            border-bottom: 1px solid rgba(0, 191, 255, 0.1);
            font-size: 14px;
        }

        .students-table tbody tr:hover {
            background: rgba(0, 191, 255, 0.05);
        }

        .students-table tbody tr:last-child td {
            border-bottom: none;
        }

        .student-avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            border: 2px solid var(--primary-color);
        }

        .student-cell {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .student-name {
            color: var(--primary-color);
            font-weight: 600;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-active {
            background: rgba(76, 175, 80, 0.3);
            color: #4caf50;
        }

        .status-inactive {
            background: rgba(244, 67, 54, 0.3);
            color: #f44336;
        }

        .table-actions {
            display: flex;
            gap: 8px;
        }

        .btn-action {
            padding: 6px 12px;
            border: 1px solid var(--primary-color);
            background: transparent;
            color: var(--primary-color);
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: var(--transition);
        }

        .btn-action:hover {
            background: var(--primary-color);
            color: var(--bg-dark);
        }

        .btn-edit {
            border-color: #2196f3;
            color: #2196f3;
        }

        .btn-edit:hover {
            background: #2196f3;
            color: white;
        }

        .btn-delete {
            border-color: #f44336;
            color: #f44336;
        }

        .btn-delete:hover {
            background: #f44336;
            color: white;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(135deg, #0d5f7f 0%, #0a4a63 100%);
            padding: 40px;
            border-radius: var(--border-radius-lg);
            border: 2px solid var(--primary-color);
            width: 90%;
            max-width: 600px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            border-bottom: 2px solid rgba(0, 191, 255, 0.2);
            padding-bottom: 15px;
        }

        .modal-header h2 {
            margin: 0;
            color: var(--primary-color);
        }

        .close-btn {
            background: transparent;
            border: none;
            color: var(--primary-color);
            font-size: 28px;
            cursor: pointer;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--primary-color);
            font-weight: 600;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(0, 191, 255, 0.3);
            border-radius: var(--border-radius);
            color: white;
            font-family: inherit;
            transition: var(--transition);
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 15px rgba(0, 191, 255, 0.3);
        }

        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .form-group select option {
            background: var(--bg-dark);
            color: white;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .modal-footer {
            display: flex;
            gap: 15px;
            justify-content: flex-end;
            margin-top: 25px;
        }

        .modal-footer button {
            padding: 12px 25px;
            border: none;
            border-radius: var(--border-radius);
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
        }

        .btn-save {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-dark) 100%);
            color: white;
            box-shadow: 0 4px 12px var(--shadow-glow);
        }

        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 191, 255, 0.5);
        }

        .btn-cancel {
            background: rgba(255, 255, 255, 0.1);
            color: var(--primary-color);
            border: 2px solid var(--primary-color);
        }

        .btn-cancel:hover {
            background: rgba(0, 191, 255, 0.2);
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 30px 0;
        }

        .pagination button,
        .pagination span {
            padding: 10px 15px;
            border: 1px solid var(--primary-color);
            background: transparent;
            color: var(--primary-color);
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
        }

        .pagination button:hover,
        .pagination .active {
            background: var(--primary-color);
            color: var(--bg-dark);
        }

        @media (max-width: 768px) {
            .page-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .action-buttons {
                width: 100%;
            }

            .search-filter {
                grid-template-columns: 1fr;
            }

            .table-container {
                overflow-x: auto;
            }

            .modal-content {
                padding: 25px;
            }

            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <a href="admin-dashboard.html" class="home-btn">← Back to Dashboard</a>

    <header>
        <h1>Manage Students - Admin Panel</h1>
        <p>Add, Edit, and Manage Student Records</p>
    </header>

    <div class="admin-container">
        <!-- Page Header -->
        <div class="page-header">
            <div class="page-title">
                <h2>👨‍🎓 Student Management</h2>
            </div>
            <div class="action-buttons">
                <button class="btn-primary" onclick="openAddStudentModal()">➕ Add New Student</button>
                <button class="btn-secondary" onclick="exportStudents()">📥 Export Data</button>
            </div>
        </div>

        <!-- Search & Filter -->
        <div class="search-filter">
            <input type="text" id="searchInput" placeholder="Search by name or ID..." onkeyup="filterStudents()">
            <select id="tradeFilter" onchange="filterStudents()">
                <option value="">All Trades</option>
                <option value="SOD">Software Development</option>
                <option value="ETE">Electrical Technology</option>
                <option value="BDC">Building Construction</option>
                <option value="ELT">Electronics & Telecom</option>
            </select>
            <select id="statusFilter" onchange="filterStudents()">
                <option value="">All Status</option>
                <option value="Active">Active</option>
                <option value="Inactive">Inactive</option>
            </select>
            <button class="btn-secondary" onclick="resetFilters()" style="width: 100%;">🔄 Reset Filters</button>
        </div>

        <!-- Students Table -->
        <div class="table-container">
            <table class="students-table">
                <thead>
                    <tr>
                        <th>Student</th>
                        <th>ID</th>
                        <th>Email</th>
                        <th>Trade</th>
                        <th>Year</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="studentsBody">
                    <!-- Will be populated by JavaScript -->
                </tbody>
            </table>
        </div>

        <!-- Pagination -->
        <div class="pagination">
            <button onclick="prevPage()">← Previous</button>
            <span id="pageInfo">Page 1</span>
            <button onclick="nextPage()">Next →</button>
        </div>
    </div>

    <!-- Add/Edit Student Modal -->
    <div class="modal" id="studentModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Add New Student</h2>
                <button class="close-btn" onclick="closeStudentModal()">×</button>
            </div>

            <form id="studentForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="firstName">First Name *</label>
                        <input type="text" id="firstName" required>
                    </div>
                    <div class="form-group">
                        <label for="lastName">Last Name *</label>
                        <input type="text" id="lastName" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="email">Email *</label>
                        <input type="email" id="email" required>
                    </div>
                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="trade">Trade Program *</label>
                        <select id="trade" required>
                            <option value="">Select Trade</option>
                            <option value="SOD">Software Development (SOD)</option>
                            <option value="ETE">Electrical Technology (ETE)</option>
                            <option value="BDC">Building Construction (BDC)</option>
                            <option value="ELT">Electronics & Telecom (ELT)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="year">Year *</label>
                        <select id="year" required>
                            <option value="">Select Year</option>
                            <option value="1">Year 1</option>
                            <option value="2">Year 2</option>
                            <option value="3">Year 3</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="enrollment">Enrollment Date *</label>
                        <input type="date" id="enrollment" required>
                    </div>
                    <div class="form-group">
                        <label for="status">Status *</label>
                        <select id="status" required>
                            <option value="Active">Active</option>
                            <option value="Inactive">Inactive</option>
                            <option value="Graduated">Graduated</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="notes">Notes</label>
                    <textarea id="notes" rows="3" placeholder="Additional notes about the student..."></textarea>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn-cancel" onclick="closeStudentModal()">Cancel</button>
                    <button type="submit" class="btn-save">Save Student</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let allStudents = [
            { id: "SLG001", firstName: "Jean-Paul", lastName: "Nkusi", email: "jnkusi@slg.com", phone: "+250 788 123 456", trade: "SOD", year: "3", enrollment: "2023-08-15", status: "Active" },
            { id: "SLG002", firstName: "Marie", lastName: "Uwimana", email: "muwimana@slg.com", phone: "+250 789 234 567", trade: "ETE", year: "2", enrollment: "2024-08-20", status: "Active" },
            { id: "SLG003", firstName: "Pierre", lastName: "Karangwa", email: "pkarangwa@slg.com", phone: "+250 790 345 678", trade: "BDC", year: "1", enrollment: "2025-08-25", status: "Active" },
            { id: "SLG004", firstName: "Alice", lastName: "Kubwimana", email: "akubwimana@slg.com", phone: "+250 791 456 789", trade: "ELT", year: "3", enrollment: "2023-08-12", status: "Active" },
            { id: "SLG005", firstName: "Emmanuel", lastName: "Habimana", email: "ehabimana@slg.com", phone: "+250 792 567 890", trade: "SOD", year: "2", enrollment: "2024-08-18", status: "Active" },
            { id: "SLG006", firstName: "Nadine", lastName: "Tuyisenge", email: "ntuyisenge@slg.com", phone: "+250 793 678 901", trade: "BDC", year: "3", enrollment: "2023-08-10", status: "Inactive" },
        ];

        let currentPage = 1;
        const itemsPerPage = 5;

        function displayStudents(students) {
            const tbody = document.getElementById("studentsBody");
            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const paginatedStudents = students.slice(start, end);

            tbody.innerHTML = paginatedStudents.map(student => `
                <tr>
                    <td>
                        <div class="student-cell">
                            <div class="student-avatar">${student.firstName[0]}</div>
                            <span class="student-name">${student.firstName} ${student.lastName}</span>
                        </div>
                    </td>
                    <td>${student.id}</td>
                    <td>${student.email}</td>
                    <td>${student.trade}</td>
                    <td>Year ${student.year}</td>
                    <td><span class="status-badge status-${student.status.toLowerCase()}">${student.status}</span></td>
                    <td>
                        <div class="table-actions">
                            <button class="btn-action btn-edit" onclick="editStudent('${student.id}')">Edit</button>
                            <button class="btn-action btn-delete" onclick="deleteStudent('${student.id}')">Delete</button>
                        </div>
                    </td>
                </tr>
            `).join('');

            document.getElementById("pageInfo").textContent = `Page ${currentPage} of ${Math.ceil(students.length / itemsPerPage)}`;
        }

        function filterStudents() {
            const search = document.getElementById("searchInput").value.toLowerCase();
            const trade = document.getElementById("tradeFilter").value;
            const status = document.getElementById("statusFilter").value;

            const filtered = allStudents.filter(student => {
                const matchesSearch = student.firstName.toLowerCase().includes(search) || student.id.includes(search);
                const matchesTrade = !trade || student.trade === trade;
                const matchesStatus = !status || student.status === status;
                return matchesSearch && matchesTrade && matchesStatus;
            });

            currentPage = 1;
            displayStudents(filtered);
        }

        function resetFilters() {
            document.getElementById("searchInput").value = "";
            document.getElementById("tradeFilter").value = "";
            document.getElementById("statusFilter").value = "";
            currentPage = 1;
            displayStudents(allStudents);
        }

        function openAddStudentModal() {
            document.getElementById("modalTitle").textContent = "Add New Student";
            document.getElementById("studentForm").reset();
            document.getElementById("studentModal").classList.add("show");
        }

        function closeStudentModal() {
            document.getElementById("studentModal").classList.remove("show");
        }

        function editStudent(id) {
            alert(`Editing student: ${id}`);
        }

        function deleteStudent(id) {
            if (confirm(`Are you sure you want to delete student ${id}?`)) {
                alert(`Student ${id} deleted successfully`);
            }
        }

        function exportStudents() {
            alert("Exporting student data...\nFeature would generate CSV/Excel file");
        }

        function prevPage() {
            if (currentPage > 1) {
                currentPage--;
                displayStudents(allStudents);
            }
        }

        function nextPage() {
            const maxPages = Math.ceil(allStudents.length / itemsPerPage);
            if (currentPage < maxPages) {
                currentPage++;
                displayStudents(allStudents);
            }
        }

        document.getElementById("studentForm").addEventListener("submit", (e) => {
            e.preventDefault();
            alert("Student saved successfully!");
            closeStudentModal();
            displayStudents(allStudents);
        });

        displayStudents(allStudents);
    </script>
</body>
</html>
